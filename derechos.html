<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adventure for Children's Rights</title>

<style>

body{
margin:0;
height:100vh;
background-image:url("img/derechos.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* titulo centrado arriba */

.titulo{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
width:500px;
max-width:80%;
z-index:10;
}

/* contenedor de cofres */
.contenedor-cofres{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%, -50%);
display:flex;
flex-direction:column;
gap:40px;
align-items:center;
z-index:10;
}

.fila-cofres{
display:flex;
gap:30px;
justify-content:center;
}

.cofre{
width:80px;
height:80px;
object-fit:contain;
text-align:center;
}

</style>

</head>

<body>

<img src="img/rights.png" class="titulo">

<div class="contenedor-cofres">
  <div class="fila-cofres">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
  </div>
  <div class="fila-cofres">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
    <img src="img/cofre.png" class="cofre">
  </div>
</div>

</body>
</html>
